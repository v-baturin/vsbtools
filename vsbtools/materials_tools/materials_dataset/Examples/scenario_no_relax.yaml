version: 1

globals:
  toolkit_options:
    structure_parser:
      # 'root' is set at runtime from tmp_inbox
      source_name: "Mattergen"
      batch_metadata_file: "input_parameters.txt"
    symmetry:
      a_sym_prec: 1.0e-2
      e_sym_prec: 1.0e-2
    similarity:
      tol_FP: 0.02
    uspex: {}
    estimator:
      default_model: grace
      force_gpu: 1
    phase_diag: {}

stages:
  parse_raw:
    op: parse_raw
    needs: []
    params: {}
    # elements are taken from ctx.globals["elements"],
    # which you set from batch metadata in Python

  symmetrize_raw:
    op: symmetrize
    needs: [ parse_raw ]
    params: { }

  check_min_dist:
    op: discard_close_atoms
    needs: [ symmetrize_raw ]

  estimate_all:
    op: estimate
    needs: [ check_min_dist ]
    params: { }

  poll_db:
    op: poll_db
    needs: [parse_raw]  # To automatically get the elements
    params:
      max_ehull: 0.5
      estimate_energies: true
      pref_db: op
      do_ehull_filtering: true
      do_deduplication: true
      tol_FP: 0.008
      # cache_base_path can optionally be overridden in code if you
      # want DB_CACHE / <system>_<flags>_<max_ehull>

  deduplicate_all:
    op: deduplicate
    needs: [ estimate_all ]
    params: { }


  add_ref_all:
    op: merge_base_into_ref
    needs: [estimate_all, poll_db]
    params:
      base_parent: estimate_all
      ref_parent: poll_db
      merge: false


  add_ref_deduplicated:
    op: merge_base_into_ref
    needs: [deduplicate_all, poll_db]
    params:
      base_parent: deduplicate_all
      ref_parent: poll_db
      merge: false

