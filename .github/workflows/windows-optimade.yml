name: Windows OPTIMADE

on:
  push:
    paths:
      - ".github/workflows/windows-optimade.yml"
      - "pyproject.toml"
      - "vsbtools/materials_tools/cache_paths.py"
      - "vsbtools/materials_tools/materials_dataset/converters.py"
      - "vsbtools/materials_tools/materials_dataset/io/preset_loaders.py"
      - "vsbtools/materials_tools/materials_dataset/io/sources/matproj_parser.py"
      - "vsbtools/materials_tools/materials_dataset/io/sources/optimade_parser.py"
      - "vsbtools/materials_tools/materials_dataset/io/sources/unittests/optimade_parser_Test.py"
      - "vsbtools/materials_tools/materials_dataset/io/unittests/optimade_cache_Test.py"
      - "vsbtools/materials_tools/materials_dataset/scripts/poll_databases.py"
      - "vsbtools/materials_tools/unittests/cache_paths_Test.py"
  pull_request:
    paths:
      - ".github/workflows/windows-optimade.yml"
      - "pyproject.toml"
      - "vsbtools/materials_tools/cache_paths.py"
      - "vsbtools/materials_tools/materials_dataset/converters.py"
      - "vsbtools/materials_tools/materials_dataset/io/preset_loaders.py"
      - "vsbtools/materials_tools/materials_dataset/io/sources/matproj_parser.py"
      - "vsbtools/materials_tools/materials_dataset/io/sources/optimade_parser.py"
      - "vsbtools/materials_tools/materials_dataset/io/sources/unittests/optimade_parser_Test.py"
      - "vsbtools/materials_tools/materials_dataset/io/unittests/optimade_cache_Test.py"
      - "vsbtools/materials_tools/materials_dataset/scripts/poll_databases.py"
      - "vsbtools/materials_tools/unittests/cache_paths_Test.py"
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install OPTIMADE dependencies
        run: python -m pip install ".[optimade]"
      - name: Check installed dependencies
        run: python -m pip check
      - name: Run Windows compatibility tests
        env:
          # The test packages are excluded from the installed distribution, so
          # resolve their dotted module names from the checkout.
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          python -m unittest
          vsbtools.materials_tools.unittests.cache_paths_Test
          vsbtools.materials_tools.materials_dataset.io.unittests.optimade_cache_Test
          vsbtools.materials_tools.materials_dataset.io.sources.unittests.optimade_parser_Test
